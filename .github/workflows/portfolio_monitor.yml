name: Portfolio News Monitor

on:
  schedule:
    - cron: "30 23 * * 0-4"  # KST 08:30 (UTC 23:30 전날, 월-금)
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install anthropic requests

      - name: 스크립트 다운로드
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -H "Authorization: token $GH_TOKEN"                -H "Accept: application/vnd.github.v3.raw"                -o portfolio_monitor.py                https://api.github.com/repos/fundjylee-cmd/portfolio-reports/contents/portfolio_monitor.py

      - name: 뉴스 모니터링 실행
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_SENDER:        ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENTS:    ${{ secrets.GMAIL_RECIPIENTS }}
          GH_TOKEN:            ${{ secrets.GH_TOKEN }}
        run: python portfolio_monitor.py
